version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tribal_db
    restart: always
    environment:
      POSTGRES_USER: tribal_admin
      POSTGRES_PASSWORD: SecretTribalPassword2026
      POSTGRES_DB: tribal_marketplace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribal_admin -d tribal_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tribal_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://tribal_admin:SecretTribalPassword2026@db:5432/tribal_marketplace
      - JWT_SECRET=supersecret-tribal-marketplace-key-2026
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
