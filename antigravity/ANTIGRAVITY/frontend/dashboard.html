<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribal E-Marketplace Portal - Dashboard</title>
    
    <!-- Design System Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Dynamic Header Navigation (Injected by app.js) -->
    <header></header>

    <div class="container" id="dashboard-portal-container" style="min-height: 600px; margin-top: 30px;">
        <!-- Container is dynamically generated based on authenticated role by dashboard.js -->
        <div style="text-align:center; padding:100px 0; color:var(--text-muted);">
            <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <h3>Loading Portal Session...</h3>
        </div>
    </div>

    <!-- Dynamic Footer Layout (Injected by app.js) -->
    <footer></footer>

    <!-- Scripts Inclusion -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dashboard.js"></script>
    
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
